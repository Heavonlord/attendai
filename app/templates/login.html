<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AttendAI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <style>
        body { background: linear-gradient(135deg, #1F3864 0%, #2E75B6 100%); min-height: 100vh; display: flex; align-items: center; }
        .login-card { border-radius: 24px; border: none; box-shadow: 0 25px 60px rgba(0,0,0,0.25); max-width: 420px; width: 100%; }
        .login-header { background: linear-gradient(135deg, #1F3864, #2E75B6); border-radius: 20px 20px 0 0; padding: 2.5rem; color: white; text-align: center; }
    </style>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card card">
        <div class="login-header">
            <div class="fs-1 mb-2"><i class="bi bi-clipboard2-check-fill"></i></div>
            <h3 class="fw-bold mb-1">AttendAI</h3>
            <p class="opacity-75 mb-0 small">AI Attendance Management System</p>
        </div>
        <div class="card-body p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('main.login') }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username or Email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Enter username or email" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" id="password" class="form-control" placeholder="Enter password" required>
                        <button class="btn btn-outline-secondary" type="button" onclick="togglePwd()">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" name="remember" id="remember">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold rounded-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
            </form>

            <hr class="my-3">
            <div class="bg-light rounded-3 p-3">
                <p class="small fw-semibold mb-2 text-muted"><i class="bi bi-info-circle me-1"></i>Demo Accounts:</p>
                <div class="row g-1 text-center">
                    <div class="col-3"><button class="btn btn-sm btn-outline-danger w-100" onclick="fill('admin','admin123')">Admin</button></div>
                    <div class="col-3"><button class="btn btn-sm btn-outline-success w-100" onclick="fill('teacher1','teacher123')">Teacher</button></div>
                    <div class="col-3"><button class="btn btn-sm btn-outline-primary w-100" onclick="fill('student1','student123')">Student</button></div>
                    <div class="col-3"><a href="{{ url_for('main.parent_register') }}" class="btn btn-sm btn-outline-warning w-100">Parent</a></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePwd() {
    const p = document.getElementById('password');
    const e = document.getElementById('eyeIcon');
    if (p.type === 'password') { p.type = 'text'; e.className = 'bi bi-eye-slash'; }
    else { p.type = 'password'; e.className = 'bi bi-eye'; }
}
function fill(u, p) {
    document.querySelector('[name=username]').value = u;
    document.querySelector('[name=password]').value = p;
}
</script>
</body>
</html>
